<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Creditos Ismael Yat Pérez -->
<title>Control de Recorridos</title>

<style>
body{
    background:#121212;
    font-family:Arial;
    color:white;
    padding:20px;
}
.container{ max-width:500px; margin:auto; }
.card{
    background:#1e1e1e;
    padding:20px;
    border-radius:15px;
}
input, select{
    width:100%;
    padding:10px;
    margin:8px 0;
    border-radius:8px;
    border:none;
}
button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
}
.guardar{ background:#00c853; color:white; }
.whatsapp{ background:#25D366; color:white; }
.vaciar{ background:#d50000; color:white; }

.barra{ display:flex; margin:10px 0; }
.segmento{
    flex:1;
    height:18px;
    margin:2px;
    background:#333;
    border-radius:3px;
}
.activo{ background:#00e676; }

.bajo{
    background:#FFD600 !important;
}

.medio{
    background:#00e676 !important;
}
.agotado{
    background:red !important;
    animation:parpadeo 1s infinite;
}
@keyframes parpadeo{
    0%{opacity:1;}
    50%{opacity:0.3;}
    100%{opacity:1;}
}
.alerta{
    color:red;
    font-weight:bold;
    text-align:center;
}
.item{
    background:#2a2a2a;
    padding:10px;
    border-radius:8px;
    margin-bottom:8px;
    font-size:14px;
}
a{ color:#4fc3f7; }
img{
    width:100%;
    border-radius:10px;
    margin-top:10px;
}
</style>
</head>
<body>

<div class="container">
<div class="card">

<h2>Control de Recorridos</h2>

<label> Piloto</label>
<input type="text" id="piloto">

<label> Placa </label>
<input type="text" id="placa">

<label>📍 Lugar</label>
<input type="text" id="lugar">

<label>🛣 Kilometraje</label>
<input type="number" id="kilometraje">

<label>Respaldo Fotografico</label>
<input type="file" id="foto" accept="image/*" capture="environment">
<img id="preview">

<label>⛽ Combustible</label>
<select id="combustible" onchange="actualizarBarra()">
<option value="0">0/8</option>
<option value="1">1/8</option>
<option value="2">2/8</option>
<option value="3">3/8</option>
<option value="4">4/8</option>
<option value="5">5/8</option>
<option value="6">6/8</option>
<option value="7">7/8</option>
<option value="8" selected>8/8</option>
</select>

<div class="barra" id="barra"></div>
<div class="alerta" id="alerta"></div>

<button class="guardar" onclick="guardar()">Guardar</button>
<button class="whatsapp" onclick="enviarWhatsApp()">📤 Enviar a WhatsApp</button>
<button class="vaciar" onclick="vaciarHistorial()">🗑 Vaciar Historial</button>

<h3>Historial</h3>
<div id="lista"></div>

</div>
</div>

<script>

let preview = document.getElementById("preview");

document.getElementById("foto").addEventListener("change", function(e){
    if(e.target.files[0]){
        let reader = new FileReader();
        reader.onload = function(){
            preview.src = reader.result;
        }
        reader.readAsDataURL(e.target.files[0]);
    }
});

function crearBarra(){
    let barra = document.getElementById("barra");
    barra.innerHTML="";
    for(let i=0;i<8;i++){
        let div = document.createElement("div");
        div.classList.add("segmento");
        barra.appendChild(div);
    }
}
crearBarra();

function actualizarBarra(){

    let valor = parseInt(document.getElementById("combustible").value);
    let segmentos = document.querySelectorAll(".segmento");
    let alerta = document.getElementById("alerta");

    segmentos.forEach((seg,i)=>{
        seg.classList.remove("activo","agotado","bajo","medio");

        if(i < valor){

            if(valor === 0){
                seg.classList.add("agotado");
            }
            else if(valor <= 3){
                seg.classList.add("bajo"); // Amarillo
            }
            else{
                seg.classList.add("medio"); // Verde
            }

        }
    });

    // Mensajes
    if(valor === 0){
        segmentos.forEach(seg=>seg.classList.add("agotado"));
        alerta.innerHTML="🚨 COMBUSTIBLE AGOTADO";
    }
    else if(valor <= 3){
        alerta.innerHTML="⚠ NIVEL BAJO DE COMBUSTIBLE";
        alerta.style.color = "#FFD600";
    }
    else{
        alerta.innerHTML="";
    }
}

function obtenerGPS(){
    return new Promise((resolve, reject)=>{
        navigator.geolocation.getCurrentPosition(
            pos => resolve({
                lat: pos.coords.latitude,
                lon: pos.coords.longitude
            }),
            err => reject(err)
        );
    });
}

async function guardar(){

    let piloto = document.getElementById("piloto").value;
    let placa = document.getElementById("placa").value;
    let lugar = document.getElementById("lugar").value;
    let kilometraje = document.getElementById("kilometraje").value;
    let combustible = document.getElementById("combustible").value;
    let foto = null;

    if(!lugar || !kilometraje){
        alert("Completa los campos");
        return;
    }

    let gps = {lat:"No disponible", lon:"No disponible"};

    try{
        gps = await obtenerGPS();
    }catch{
        alert("No se pudo obtener GPS");
    }

    let historial = JSON.parse(localStorage.getItem("historial")) || [];

let registro = {
    fecha: new Date().toLocaleString(),
    piloto,
    placa,
    lugar,
    kilometraje,
    combustible,
    lat: gps.lat,
    lon: gps.lon
};

    historial.push(registro);
    localStorage.setItem("historial", JSON.stringify(historial));

    mostrarHistorial();
    alert("Guardado correctamente ✅");
}

async function enviarWhatsApp(){

    let historial = JSON.parse(localStorage.getItem("historial")) || [];

    if(historial.length === 0){
        await guardar();
        historial = JSON.parse(localStorage.getItem("historial")) || [];
        if(historial.length === 0){
            alert("No se pudo generar el registro");
            return;
        }
    }

    let u = historial[historial.length-1];

    // ===== CREAR CANVAS =====
    let canvas = document.createElement("canvas");
    canvas.width = 900;
    canvas.height = 700;
    let ctx = canvas.getContext("2d");

    ctx.fillStyle = "#121212";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle = "#1e1e1e";
    ctx.fillRect(40,40,820,620);

    ctx.fillStyle = "#00e676";
    ctx.font = "bold 40px Arial";
    ctx.fillText("DESTINO", 80, 100);

    ctx.fillStyle = "white";
    ctx.font = "26px Arial";


    ctx.fillText("📅 Fecha: " + u.fecha, 80, 160);
ctx.fillText("Piloto: " + u.piloto, 80, 180);
ctx.fillText("Placa: " + u.placa, 80, 190);
    ctx.fillText("📍 Lugar: " + u.lugar, 80, 200);
    ctx.fillText("🛣 Kilometraje: " + u.kilometraje, 80, 240);

// ===== TITULO UBICACION =====
ctx.fillStyle = "#00e676";
ctx.font = "bold 28px Arial";
ctx.fillText("📍 Ubicación:", 80, 280);

ctx.fillStyle = "white";
ctx.font = "24px Arial";
ctx.fillText("Lat: " + u.lat, 80, 315);
ctx.fillText("Lon: " + u.lon, 80, 345);

    // ===== BARRA COMBUSTIBLE =====
    let combustible = parseInt(u.combustible);
// ===== TITULO COMBUSTIBLE =====
ctx.fillStyle = "#00e676";
ctx.font = "bold 28px Arial";
ctx.fillText("⛽ Combustible:", 80, 380);
    let startX = 80;
    let startY = 400;
    let width = 70;
    let height = 25;
    let gap = 8;

    let colorActivo;

    if(combustible === 0){
        colorActivo = "red";
    }
    else if(combustible <= 3){
        colorActivo = "#FFD600";
    }
    else{
        colorActivo = "#00e676";
    }

    for(let i=0;i<8;i++){
        ctx.fillStyle = i < combustible ? colorActivo : "#333";
        ctx.fillRect(startX + i*(width+gap), startY, width, height);
    }

    // ===== FOTO =====
    if(preview.src){
    let img = new Image();
    img.src = preview.src;
        

        await new Promise(resolve => img.onload = resolve);

        ctx.drawImage(img, 80, 460, 350, 200);
    }

    // ===== CONVERTIR A ARCHIVO REAL =====

    canvas.toBlob(async function(blob){

    if(!blob){
        alert("No se pudo generar la imagen.");
        return;
    }

    const file = new File([blob], "reporte_recorrido.png", {
        type: "image/png"
    });

    const maps = `https://www.google.com/maps?q=${u.lat},${u.lon}`;

    const texto =
`🚗 DESTINO 🚗

Fecha: ${u.fecha}
Piloto: ${u.piloto}
Placa: ${u.placa}
Lugar: ${u.lugar}
KM: ${u.kilometraje}
Combustible: ${u.combustible}/8
Ubicación: ${maps}`;

    // 🔥 INTENTAR COMPARTIR DIRECTO (IPHONE & ANDROID)
    if (navigator.share) {
    try{
        await navigator.share({
            title: "Control de Recorrido",
            text: texto,
            files: [file]
        });

        // 🔥 LIMPIAR FOTO DESPUÉS DE ENVIAR
        preview.src = "";
        document.getElementById("foto").value = "";

        return; // si funciona salimos

    }catch(err){
        console.log("Share cancelado o no soportado");
    }
}

        document.getElementById("lugar").value = "";
document.getElementById("piloto").value = "";
document.getElementById("placa").value = "";
document.getElementById("kilometraje").value = "";
document.getElementById("combustible").value = "8";
actualizarBarra();

    // 🔥 FALLBACK PARA IPHONE PROBLEMÁTICO
    const url = URL.createObjectURL(blob);
    window.open(url, "_blank");
    alert("Mantén presionada la imagen y selecciona 'Guardar en Fotos', luego adjúntala en WhatsApp.");

}, "image/png");
}




function mostrarHistorial(){

    let lista = document.getElementById("lista");
    let historial = JSON.parse(localStorage.getItem("historial")) || [];
    lista.innerHTML="";

    historial.forEach(reg=>{

        let link = `https://www.google.com/maps?q=${reg.lat},${reg.lon}`;

        lista.innerHTML += `
        <div class="item">
            <strong>${reg.fecha}</strong><br>
Piloto: ${reg.piloto}<br>
Placa: ${reg.placa}<br>            
Lugar: ${reg.lugar}<br>
            KM: ${reg.kilometraje}<br>
            Combustible: ${reg.combustible}/8<br>
            GPS:<br>
            <a href="${link}" target="_blank">${link}</a>
        </div>
        `;
    });
}

function vaciarHistorial(){
    if(confirm("¿Seguro que deseas borrar todo?")){
        localStorage.removeItem("historial");
        mostrarHistorial();
    }
}

mostrarHistorial();
actualizarBarra();

</script>

</body>
</html>
